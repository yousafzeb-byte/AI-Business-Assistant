services:
  # ── Backend: Flask API ──────────────────────────────────────
  - type: web
    name: ai-biz-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 2 --timeout 120 run:app
    healthCheckPath: /api/health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: ai-biz-db
          property: connectionString
      - key: RATELIMIT_STORAGE_URI
        value: memory://
      - key: FRONTEND_URL
        value: https://ai-biz-frontend.onrender.com # update after first deploy
      - key: OPENAI_API_KEY
        sync: false
      # Optional: fill in to enable password-reset emails
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false

  # ── Frontend: React / Vite SPA ─────────────────────────────
  - type: static
    name: ai-biz-frontend
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://ai-biz-backend.onrender.com/api # update after first deploy
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

# ── PostgreSQL database (free tier) ────────────────────────────
databases:
  - name: ai-biz-db
    plan: free
    databaseName: ai_business_db
    user: ai_biz_user
